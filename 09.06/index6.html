<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><center>
    
    <div>
        <h1>map() ve filter() Dizi Methodları</h1>
    </div> <hr>
    <div>
        <label >Ürün Arama</label>
        <input id="input-search" type="text">
    </div> <br>

    <div>
        <label >Maksimum Fiyat</label>
        <input type="number" id="input-price-limit" value="50000">
    </div> <br>

    <div>
        <button id="btn-filter">Filtrele</button>
    </div>

    <div>
        <h3>Ürün Listesi</h3>
        <div id="product-list"></div>
    </div>

    <script>

        const products=[
            {id:1, ad:'Iphone 17 Pro Max' , fiyat:110000},
            {id:2, ad:'Iphone 16 Pro Max' , fiyat:25000},
            {id:3, ad:'Iphone 15 Pro Max' , fiyat:47590},
            {id:4, ad:'Iphone 14 Pro Max' , fiyat:99000},
            {id:5, ad:'Iphone 13 Pro Max' , fiyat:78000},
            ]

            const listele= ()=>{
                const arama =document.getElementById('input-search').value.toLowerCase();
                const limit = parseFloat(document.getElementById('input-price-limit').value || 99999);

                const filtrelenmis = products.filter(product=>{
                    return product.ad.toLowerCase().includes(arama)&& product.fiyat <= limit;
                })

                const kartlarHTML=filtrelenmis.map(product=>`
                
                <div> 
                    <span>${product.ad}</span>
                    <span>${product.fiyat}</span>
                    </div>
                    `).join('');

                    document.getElementById('product-list').innerHTML=kartlarHTML || `<div></div>`;

                    };

                    document.getElementById('btn-filter').addEventListener('click', listele);
                    listele();
    </script>

    </center>
</body>
</html>
