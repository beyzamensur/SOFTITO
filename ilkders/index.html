<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div>
        
   <button id="change" >Gönder</button>
   <p id="yazi">Değiştirilsin mi?</p>
    </div>
   
   
   <script>
    const buton = document.getElementById('change');
    const yazi = document.getElementById('yazi');
    buton.addEventListener('click',function(){
        yazi.textContent= 'butona tıklandı!';
    });
    
  

   </script>
    
</body>
</html>
