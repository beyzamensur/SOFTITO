<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"> </script>
</head>
<body class="bg-slate-100 p-8 flex flex-col items-center">
    <div class="max-w-xl w-full bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Tailwind Flexbox</h1>
        <div class="flex flex-col gap-4">
            <div>
                <span class="text-xs text-slate-400 block mb-1">flex gap-4(yanyana yerleşim)</span>
                <div class="flex flex-col md:flex-row gap-4 bg-slate-200 p-3 border rounded">
                    /*responsive tasarımda kutuların alt alta gelmesi için 
                    1. yöntem : kutuları kapsayan div class'ının içine (15.satır) flex yerine flex-col md:flex-row sınıflarını eklemek.*/
                    <div class="bg-blue-500 text-white p-3 rounded">Kutu1</div>
                    <div class="bg-yellow-500 ext-white p-3 rounded">Kutu2</div>
                    <div class="bg-red-500 ext-white p-3 rounded">Kutu3</div>
                </div>
            </div>
            <div>
                <span class="text-xs text-slate-500 block mb-1">Flex (iki uca yaslama)</span>
            </div class="flex justify-between items-center bg-slate-55 border rounded" >
            <div>
            <span class="font-semibold text-slate-700">Sol</span>
            <button>Sağ</button>
            </div>
        </div>
    </div>
     
    

</body>
</html>
