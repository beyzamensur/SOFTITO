<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Relative Konumlandırma Ödevi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">

    <div class="relative w-64 h-64 bg-white border-4 border-indigo-200 rounded-lg shadow-xl p-4">
        
        <p class="text-gray-500 font-bold">Relative Kapsayıcı</p>

        <div class="absolute top-0 right-0 bg-indigo-600 text-white text-[10px] px-2 py-1 rounded-bl-lg">
            Absolute Eleman
        </div>

        <div class="absolute bottom-2 left-2 bg-green-500 text-white text-[10px] px-2 py-1 rounded">
            Hassas Konumlandırma
        </div>
    </div>

    <div class="mt-8 max-w-md text-sm text-gray-600">
        <h3 class="font-bold">Ödev Notları:</h3>
        <ul class="list-disc ml-5 space-y-1">
            <li><b>relative:</b> Öğeyi "referans noktası" yapar.</li>
            <li><b>absolute:</b> Öğeyi normal akıştan çıkarır, kapsayıcıya göre konumlandırır.</li>
            <li><b>top/right/bottom/left:</b> Absolute öğenin kapsayıcı içindeki koordinatlarını belirler.</li>
        </ul>
    </div>

</body>
</html>
